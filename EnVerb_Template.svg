<svg width="1554" height="250" xmlns="http://www.w3.org/2000/svg" style="font-family:Arial,sans-serif">

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="1554" height="250" fill="#000000"/>

  <!-- ═══ TITLE ═══ -->
  <text x="777" y="21" text-anchor="middle" font-size="15" font-weight="bold" fill="#00e5c8" letter-spacing="2">ANDROID LIKES ENVERB</text>

  <!-- ═══════════════════════════════════════════════════════
       PANELS  (fill=#0d0d0d, border = panel accent colour)
       ═══════════════════════════════════════════════════════ -->

  <!-- Delay panel  x=6 y=28 w=520 h=214 -->
  <rect x="6"    y="28" width="520" height="214" rx="6" fill="#0d0d0d" stroke="#00e5c8" stroke-width="1" stroke-opacity="0.35"/>
  <text x="266"  y="44" text-anchor="middle" font-size="8" fill="#00e5c8" opacity="0.4">DELAY</text>

  <!-- Flush panel  x=532 y=28 w=112 h=214 -->
  <rect x="532"  y="28" width="112" height="214" rx="6" fill="#0d0d0d" stroke="#ff3c3c" stroke-width="1" stroke-opacity="0.35"/>
  <text x="588"  y="44" text-anchor="middle" font-size="8" fill="#ff3c3c" opacity="0.4">FLUSH</text>

  <!-- EQ panel  x=650 y=28 w=244 h=214 -->
  <rect x="650"  y="28" width="244" height="214" rx="6" fill="#0d0d0d" stroke="#00e5c8" stroke-width="1" stroke-opacity="0.35"/>
  <text x="772"  y="44" text-anchor="middle" font-size="8" fill="#00e5c8" opacity="0.4">EQ</text>

  <!-- Resonance+Mod panel  x=900 y=28 w=226 h=214 -->
  <rect x="900"  y="28" width="226" height="214" rx="6" fill="#0d0d0d" stroke="#ff3c3c" stroke-width="1" stroke-opacity="0.35"/>
  <text x="1013" y="44" text-anchor="middle" font-size="8" fill="#ff3c3c" opacity="0.4">MODULATION</text>

  <!-- ADSR panel  x=1132 y=28 w=320 h=214 -->
  <rect x="1132" y="28" width="320" height="214" rx="6" fill="#0d0d0d" stroke="#ffa500" stroke-width="1" stroke-opacity="0.35"/>
  <text x="1292" y="44" text-anchor="middle" font-size="8" fill="#ffa500" opacity="0.4">ENVELOPE</text>

  <!-- Mix panel  x=1458 y=28 w=88 h=214 -->
  <rect x="1458" y="28" width="88"  height="214" rx="6" fill="#0d0d0d" stroke="#00e5c8" stroke-width="1" stroke-opacity="0.35"/>
  <text x="1502" y="44" text-anchor="middle" font-size="8" fill="#00e5c8" opacity="0.4">MIX</text>

  <!-- ═══════════════════════════════════════════════════════
       KNOBS  — circle = knob face  (cx = x+32, cy = y+32, r=30)
               label below at cy+38
       ═══════════════════════════════════════════════════════ -->

  <!-- ── DELAY PANEL ── -->
  <!-- Room Size  x=24 -->
  <circle cx="56"  cy="72" r="30" fill="#111" stroke="#00e5c8" stroke-width="1.5"/>
  <line   x1="56"  y1="72" x2="56"  y2="44" stroke="#00e5c8" stroke-width="2" stroke-linecap="round"/>
  <text   x="56"   y="116" text-anchor="middle" font-size="9" font-weight="bold" fill="#00e5c8">Room Size</text>

  <!-- Damping  x=108 -->
  <circle cx="140" cy="72" r="30" fill="#111" stroke="#00e5c8" stroke-width="1.5"/>
  <line   x1="140" y1="72" x2="140" y2="44" stroke="#00e5c8" stroke-width="2" stroke-linecap="round"/>
  <text   x="140"  y="116" text-anchor="middle" font-size="9" font-weight="bold" fill="#00e5c8">Damping</text>

  <!-- Diffuse  x=192 -->
  <circle cx="224" cy="72" r="30" fill="#111" stroke="#39ff14" stroke-width="1.5"/>
  <line   x1="224" y1="72" x2="224" y2="44" stroke="#39ff14" stroke-width="2" stroke-linecap="round"/>
  <text   x="224"  y="116" text-anchor="middle" font-size="9" font-weight="bold" fill="#39ff14">Diffuse</text>

  <!-- Hold Size  x=276 -->
  <circle cx="308" cy="72" r="30" fill="#111" stroke="#ff3c3c" stroke-width="1.5"/>
  <line   x1="308" y1="72" x2="308" y2="44" stroke="#ff3c3c" stroke-width="2" stroke-linecap="round"/>
  <text   x="308"  y="116" text-anchor="middle" font-size="9" font-weight="bold" fill="#ff3c3c">Hold Size</text>

  <!-- Input  x=360 -->
  <circle cx="392" cy="72" r="30" fill="#111" stroke="#ff3c3c" stroke-width="1.5"/>
  <line   x1="392" y1="72" x2="392" y2="44" stroke="#ff3c3c" stroke-width="2" stroke-linecap="round"/>
  <text   x="392"  y="116" text-anchor="middle" font-size="9" font-weight="bold" fill="#ff3c3c">Input</text>

  <!-- Spread  x=444 -->
  <circle cx="476" cy="72" r="30" fill="#111" stroke="#ffa500" stroke-width="1.5"/>
  <line   x1="476" y1="72" x2="476" y2="44" stroke="#ffa500" stroke-width="2" stroke-linecap="round"/>
  <text   x="476"  y="116" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffa500">Spread</text>

  <!-- ── FLUSH BUTTON  x=540 y=122 w=96 h=26 ── -->
  <rect x="540" y="122" width="96" height="26" rx="4" fill="#0d0d0d" stroke="#ff3c3c" stroke-width="1" stroke-opacity="0.6"/>
  <text x="588" y="139" text-anchor="middle" font-size="10" font-weight="bold" fill="#ff3c3c" opacity="0.7">FLUSH</text>

  <!-- ── EQ PANEL ── -->
  <!-- High Cut  x=658 -->
  <circle cx="690" cy="72" r="30" fill="#111" stroke="#00e5c8" stroke-width="1.5"/>
  <line   x1="690" y1="72" x2="690" y2="44" stroke="#00e5c8" stroke-width="2" stroke-linecap="round"/>
  <text   x="690"  y="116" text-anchor="middle" font-size="9" font-weight="bold" fill="#00e5c8">High Cut</text>

  <!-- Crossover  x=739 -->
  <circle cx="771" cy="72" r="30" fill="#111" stroke="#00e5c8" stroke-width="1.5"/>
  <line   x1="771" y1="72" x2="771" y2="44" stroke="#00e5c8" stroke-width="2" stroke-linecap="round"/>
  <text   x="771"  y="116" text-anchor="middle" font-size="9" font-weight="bold" fill="#00e5c8">Crossover</text>

  <!-- Low Freq Lvl  x=820 -->
  <circle cx="852" cy="72" r="30" fill="#111" stroke="#ffa500" stroke-width="1.5"/>
  <line   x1="852" y1="72" x2="852" y2="44" stroke="#ffa500" stroke-width="2" stroke-linecap="round"/>
  <text   x="852"  y="116" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffa500">Low Freq Lvl</text>

  <!-- ── RESONANCE+MOD PANEL ── -->
  <!-- Resonance  x=908 -->
  <circle cx="940"  cy="72" r="30" fill="#111" stroke="#ff3c3c" stroke-width="1.5"/>
  <line   x1="940"  y1="72" x2="940"  y2="44" stroke="#ff3c3c" stroke-width="2" stroke-linecap="round"/>
  <text   x="940"   y="116" text-anchor="middle" font-size="9" font-weight="bold" fill="#ff3c3c">Resonance</text>

  <!-- Mod Rate  x=984 -->
  <circle cx="1016" cy="72" r="30" fill="#111" stroke="#ff3c3c" stroke-width="1.5"/>
  <line   x1="1016" y1="72" x2="1016" y2="44" stroke="#ff3c3c" stroke-width="2" stroke-linecap="round"/>
  <text   x="1016"  y="116" text-anchor="middle" font-size="9" font-weight="bold" fill="#ff3c3c">Mod Rate</text>

  <!-- Mod Depth  x=1060 -->
  <circle cx="1092" cy="72" r="30" fill="#111" stroke="#ff3c3c" stroke-width="1.5"/>
  <line   x1="1092" y1="72" x2="1092" y2="44" stroke="#ff3c3c" stroke-width="2" stroke-linecap="round"/>
  <text   x="1092"  y="116" text-anchor="middle" font-size="9" font-weight="bold" fill="#ff3c3c">Mod Depth</text>

  <!-- ── ADSR PANEL ── -->
  <!-- Attack  x=1148 -->
  <circle cx="1180" cy="72" r="30" fill="#111" stroke="#ffa500" stroke-width="1.5"/>
  <line   x1="1180" y1="72" x2="1180" y2="44" stroke="#ffa500" stroke-width="2" stroke-linecap="round"/>
  <text   x="1180"  y="116" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffa500">Attack</text>

  <!-- Decay  x=1228 -->
  <circle cx="1260" cy="72" r="30" fill="#111" stroke="#ffa500" stroke-width="1.5"/>
  <line   x1="1260" y1="72" x2="1260" y2="44" stroke="#ffa500" stroke-width="2" stroke-linecap="round"/>
  <text   x="1260"  y="116" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffa500">Decay</text>

  <!-- Sustain  x=1308 -->
  <circle cx="1340" cy="72" r="30" fill="#111" stroke="#00e5c8" stroke-width="1.5"/>
  <line   x1="1340" y1="72" x2="1340" y2="44" stroke="#00e5c8" stroke-width="2" stroke-linecap="round"/>
  <text   x="1340"  y="116" text-anchor="middle" font-size="9" font-weight="bold" fill="#00e5c8">Sustain</text>

  <!-- Release  x=1388 -->
  <circle cx="1420" cy="72" r="30" fill="#111" stroke="#ffa500" stroke-width="1.5"/>
  <line   x1="1420" y1="72" x2="1420" y2="44" stroke="#ffa500" stroke-width="2" stroke-linecap="round"/>
  <text   x="1420"  y="116" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffa500">Release</text>

  <!-- ENV source label  x=1140 y=122 w=76 h=110 -->
  <rect x="1140" y="122" width="76" height="110" rx="5" fill="#1a1400" stroke="#ffa500" stroke-width="1" stroke-opacity="0.6"/>
  <text x="1178" y="226" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffa500">ENV</text>
  <circle cx="1178" cy="172" r="28" fill="none" stroke="#ffa500" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3,3"/>
  <text x="1178" y="153" text-anchor="middle" font-size="7" fill="#ffa500" opacity="0.4">wheel</text>

  <!-- EnvDisplay  x=1224 y=122 w=220 h=110 -->
  <rect x="1224" y="122" width="220" height="110" rx="3" fill="#0a0a0a" stroke="#ffa500" stroke-width="1" stroke-opacity="0.25"/>
  <text x="1334" y="182" text-anchor="middle" font-size="9" fill="#ffa500" opacity="0.3">ADSR display</text>
  <text x="1334" y="194" text-anchor="middle" font-size="7" fill="#ffa500" opacity="0.2">(click to toggle linear / wheel)</text>

  <!-- ── MIX FADERS ── -->
  <!-- Dry  x=1464 y=38 w=38 h=138 -->
  <rect x="1470" y="38" width="26" height="138" rx="3" fill="#111" stroke="#777777" stroke-width="1" stroke-opacity="0.4"/>
  <!-- thumb at mid -->
  <rect x="1467" y="100" width="32" height="8" rx="2" fill="#555"/>
  <text x="1483" y="190" text-anchor="middle" font-size="9" font-weight="bold" fill="#777777">Dry</text>

  <!-- Wet  x=1508 y=38 w=38 h=138 -->
  <rect x="1514" y="38" width="26" height="138" rx="3" fill="#111" stroke="#00e5c8" stroke-width="1" stroke-opacity="0.4"/>
  <!-- thumb at mid -->
  <rect x="1511" y="100" width="32" height="8" rx="2" fill="#00e5c8" fill-opacity="0.6"/>
  <text x="1527" y="190" text-anchor="middle" font-size="9" font-weight="bold" fill="#00e5c8">Wet</text>

  <!-- ═══════════════════════════════════════════════════════
       DIMENSION ANNOTATIONS  (light guide lines + measurements)
       ═══════════════════════════════════════════════════════ -->

  <!-- Overall width annotation -->
  <line x1="0" y1="245" x2="1554" y2="245" stroke="#333" stroke-width="0.5"/>
  <text x="777" y="249" text-anchor="middle" font-size="7" fill="#555">1554 px</text>

  <!-- Overall height annotation -->
  <line x1="1548" y1="0" x2="1548" y2="250" stroke="#333" stroke-width="0.5"/>
  <text x="1550" y="125" text-anchor="start" font-size="7" fill="#555" transform="rotate(90,1550,125)">250 px</text>

  <!-- Panel top guideline -->
  <line x1="0" y1="28" x2="1554" y2="28" stroke="#222" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Knob row guideline -->
  <line x1="0" y1="40" x2="1554" y2="40" stroke="#1a1a1a" stroke-width="0.5" stroke-dasharray="2,6"/>

  <!-- ═══ COLOUR PALETTE LEGEND (bottom-left corner) ═══ -->
  <rect x="8"  y="234" width="10" height="10" fill="#00e5c8"/>
  <text x="22" y="243" font-size="7" fill="#555">Teal — delay / EQ / mix</text>
  <rect x="120" y="234" width="10" height="10" fill="#ff3c3c"/>
  <text x="134" y="243" font-size="7" fill="#555">Red — hold / input / mod</text>
  <rect x="248" y="234" width="10" height="10" fill="#ffa500"/>
  <text x="262" y="243" font-size="7" fill="#555">Gold — spread / LF / ADSR</text>
  <rect x="380" y="234" width="10" height="10" fill="#39ff14"/>
  <text x="394" y="243" font-size="7" fill="#555">Green — diffuse</text>

</svg>
